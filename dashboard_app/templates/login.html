<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ APP_NAME }} — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-950 flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">C</div>
      <h1 class="text-2xl font-bold text-white">{{ APP_NAME }}</h1>
      <p class="text-gray-400 text-sm mt-1">Sales Training Dashboard</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      {% if error %}
      <div class="mb-5 bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-lg">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Contraseña de administrador</label>
          <input
            type="password" name="password" required autofocus
            placeholder="••••••••"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors"
        >
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">{{ APP_NAME }} © {{ COMPANY_NAME }}</p>
  </div>
</body>
</html>
