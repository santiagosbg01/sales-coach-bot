{% extends "base.html" %}
{% block title %}{{ title }} — {{ APP_NAME }}{% endblock %}

{% block content %}
<a href="/prizes" class="inline-flex items-center gap-1.5 text-gray-400 hover:text-white text-sm mb-6">
  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
  </svg>
  Volver a premios
</a>

<div class="mb-6">
  <h2 class="text-2xl font-bold text-white">{{ title }}</h2>
  <p class="text-gray-400 text-sm mt-0.5">Los reps canjean puntos por estos premios.</p>
</div>

<form method="post" class="space-y-6 max-w-xl">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Nombre <span class="text-red-400">*</span></label>
      <input type="text" name="name" value="{{ form.get('name','') }}" required
        placeholder="Café con el manager"
        class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Descripción</label>
      <textarea name="description" rows="2"
        placeholder="30 min de café 1:1"
        class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ form.get('description','') }}</textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Puntos <span class="text-red-400">*</span></label>
      <input type="number" name="points_cost" value="{{ form.get('points_cost','') }}" required min="1"
        placeholder="50"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Cantidad disponible</label>
      <input type="number" name="quantity_available" value="{{ form.get('quantity_available','') }}" min="0"
        placeholder="Vacío = ilimitado"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
      <p class="text-gray-500 text-xs mt-1">Dejar vacío para stock ilimitado</p>
    </div>
    <div>
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="active" value="1"
          {{ 'checked' if form.get('active','1') == '1' else '' }}
          class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-indigo-500 focus:ring-indigo-500"/>
        <span class="text-sm text-gray-300">Activo (visible para canjear)</span>
      </label>
    </div>
  </div>

  <div class="flex gap-4">
    <button type="submit"
      class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-8 py-2.5 rounded-lg text-sm transition-colors">
      {{ 'Guardar cambios' if p else 'Crear premio' }}
    </button>
    <a href="/prizes" class="text-gray-400 hover:text-white text-sm py-2.5">Cancelar</a>
  </div>
</form>
{% endblock %}
